<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="lc"><rect x="8" y="8" width="104" height="104" rx="22"/></clipPath>
    <clipPath id="gc"><circle cx="54" cy="50" r="29"/></clipPath>
  </defs>

  <!-- Background — açık krem/peach -->
  <rect x="8" y="8" width="104" height="104" rx="22" fill="#fdf0ea"/>

  <!-- OUTSIDE layers — deri tonları, görünür -->
  <path d="M8 36 C30 22 55 42 80 34 C98 26 112 34 116 30 L116 8 L8 8 Z"                                              fill="#fce4cc" opacity="0.6"  clip-path="url(#lc)"/>
  <path d="M8 58 C30 44 55 64 80 56 C98 48 112 56 116 52 L116 30 C112 34 98 26 80 34 C55 42 30 22 8 36 Z"             fill="#FA8072" opacity="0.4"  clip-path="url(#lc)"/>
  <path d="M8 80 C30 66 55 86 80 78 C98 70 112 78 116 74 L116 52 C112 56 98 48 80 56 C55 64 30 44 8 58 Z"             fill="#c4705a" opacity="0.35" clip-path="url(#lc)"/>
  <path d="M8 116 L116 116 L116 74 C112 78 98 70 80 78 C55 86 30 66 8 80 Z"                                           fill="#f0d888" opacity="0.4"  clip-path="url(#lc)"/>

  <!-- INSIDE magnifying glass — canlı deri tonları -->
  <path d="M8 36 C30 22 55 42 80 34 C98 26 112 34 116 30 L116 8 L8 8 Z"                                              fill="#fce4cc" clip-path="url(#gc)"/>
  <path d="M8 58 C30 44 55 64 80 56 C98 48 112 56 116 52 L116 30 C112 34 98 26 80 34 C55 42 30 22 8 36 Z"             fill="#e8947a" clip-path="url(#gc)"/>
  <path d="M8 80 C30 66 55 86 80 78 C98 70 112 78 116 74 L116 52 C112 56 98 48 80 56 C55 64 30 44 8 58 Z"             fill="#c4705a" clip-path="url(#gc)"/>
  <path d="M8 116 L116 116 L116 74 C112 78 98 70 80 78 C55 86 30 66 8 80 Z"                                           fill="#f0d888" clip-path="url(#gc)"/>

  <!-- Magnifying glass ring — somon -->
  <circle cx="54" cy="50" r="29" stroke="#FA8072" stroke-width="4" fill="none"/>

  <!-- Handle -->
  <line x1="77" y1="73" x2="109" y2="106" stroke="#c4705a" stroke-width="11" stroke-linecap="round"/>
  <line x1="77" y1="73" x2="109" y2="106" stroke="#fce4cc" stroke-width="5"  stroke-linecap="round" opacity="0.9"/>

  <!-- Icon border -->
  <rect x="8" y="8" width="104" height="104" rx="22" stroke="#FA8072" stroke-width="2" fill="none" opacity="0.5"/>
</svg>
